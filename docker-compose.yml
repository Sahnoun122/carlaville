version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: carlaville-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: carlaville
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: carlaville-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  minio_data:
